services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: linkmanager
    restart: always
    working_dir: /var/www
    volumes:
      - ../src:/var/www
  nginx:
    image: nginx-alpine
    container_name: linkmanager-nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ../src:/var/www
      - ./nginx:/etc/nginx/conf.d